name: Deploy to Elastic Beanstalk

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ${{ matrix.os }}
    environment: beanstalk-deploy

    strategy:
      matrix:
        node-version: [24.x]
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-actions-${{ github.run_id }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Set version label
        id: version
        run: echo "label=v-$(git rev-parse --short HEAD)-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"

      - name: Zip source bundle
        run: zip -r app-${{ steps.version.outputs.label }}.zip app.js package.json package-lock.json

      - name: Upload bundle to S3
        run: |
          aws s3 cp app-${{ steps.version.outputs.label }}.zip \
            s3://${{ secrets.S3_BUCKET }}/app-${{ steps.version.outputs.label }}.zip

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ vars.APP_NAME }} \
            --version-label ${{ steps.version.outputs.label }} \
            --source-bundle S3Bucket=${{ secrets.S3_BUCKET }},S3Key=app-${{ steps.version.outputs.label }}.zip

      - name: Deploy new version and update APP_VERSION
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name ${{ vars.ENV_NAME }} \
            --version-label ${{ steps.version.outputs.label }} \
            --option-settings Namespace=aws:elasticbeanstalk:application:environment,OptionName=APP_VERSION,Value=${{ steps.version.outputs.label }}
